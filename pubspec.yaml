name: ug_movie
description: "Stream movies from Telegram"
publish_to: 'none'
version: 0.1.0+0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.2
  flutter_riverpod: ^2.6.1
  video_player: ^2.9.5
  chewie: ^1.10.0
  go_router: ^15.1.2
  google_fonts: ^6.3.0
  intl: ^0.20.2
  http: ^1.6.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows: true
  macos: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"
  adaptive_icon_background: "#090A0F"

flutter:
  uses-material-design: true
